# For use with the luxury theme
set -g status-style bg=#0a0a0a

# Copy/select mode - using muted blue
set -g mode-style "bg=#7a9bb5,fg=#0a0a0a"

# Pane borders - using warm greys
set -g pane-border-style fg=#2d2d2d
set -g pane-active-border-style fg=#7a9bb5

# Left status - with gold accent
set -g status-left "#[bg=#c9a84c,fg=#0a0a0a] #S #[bg=#0a0a0a,fg=#c9a84c,nobold,noitalics,nounderscore]"

# Right status - champagne and muted teal
set -g status-right "#[bg=#0a0a0a,fg=#8aa87d] #[bg=#6a9a9a,fg=#0a0a0a] %A %d %B - %H:%M "

# Active window - using steel blue
set -wg window-status-current-format "#[bg=#0a0a0a,fg=#7a9bb5,nobold,noitalics,nounderscore] #[bg=#7a9bb5,fg=#0a0a0a,bold] #{window_name}#{?window_zoomed_flag,*Z,} #[bg=#0a0a0a,fg=#7a9bb5,nobold,noitalics,nounderscore]"

# Inactive windows - subtle
set -wg window-status-format "#[bg=#0a0a0a,fg=#0a0a0a,noitalics] #[bg=#0a0a0a,fg=#777777] #{window_name} #[bg=#0a0a0a,fg=#0a0a0a,noitalics]"

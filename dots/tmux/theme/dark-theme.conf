# rose_fg="#D0CDC8"
# rose_muted="#534E46"
# rose_green="#95A682"
# rose_pink="#BC6C97"
# rose_red="#d65a6f"
# rose_coral="#EA8476"
# rose_active="#A68295"
# rose_bg="#11080D"

# -------------------------
# STATUS BAR (light rosewood adapted)
# -------------------------
set -g status-style bg=#11080D
# set -g mode-style "bg=#11080D,fg=#D0CDC8"
# avoid invisible color to select text in select mode
set -g mode-style "bg=#A68295,fg=#11080D"

set -g pane-border-style fg=#534E46
set -g pane-active-border-style fg=#A68295

set -g status-left "#[bg=#EA8476,fg=#11080D] #S #[bg=#11080D,fg=#EA8476,nobold,noitalics,nounderscore]"
set -g status-left-length 30

set -g status-right "#[bg=#11080D,fg=#95A682] #[bg=#BC6C97,fg=#11080D] %A %d %B - %H:%M "

set -wg window-status-current-format "#[bg=#11080D,fg=#BC6C97,nobold,noitalics,nounderscore] #[bg=#BC6C97,fg=#11080D] #{window_name}#{?window_zoomed_flag,*Z,} #[bg=#11080D,fg=#BC6C97,nobold,noitalics,nounderscore]"

set -wg window-status-format "#[bg=#11080D,fg=#11080D,noitalics] #[bg=#11080D,fg=#534E46] #{window_name} #[bg=#11080D,fg=#11080D,noitalics]"

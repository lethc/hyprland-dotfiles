# -------------------------
# STATUS BAR (light rosewood)
# -------------------------
set -g status-style bg=#FAFAFA
set -g mode-style "bg=#FAFAFA,fg=#383A42"

set -g pane-border-style fg=#DCD7CF
set -g pane-active-border-style fg=#A68295

set -g status-left "#[bg=#EA8476,fg=#FAFAFA] #S #[bg=#FAFAFA,fg=#EA8476,nobold,noitalics,nounderscore]"
set -g status-left-length 30

set -g status-right "#[bg=#FAFAFA,fg=#95A682] #[bg=#BC6C97,fg=#FAFAFA] %A %d %B - %H:%M "

set -wg window-status-current-format "#[bg=#FAFAFA,fg=#BC6C97,nobold,noitalics,nounderscore] #[bg=#BC6C97,fg=#FAFAFA] #{window_name}#{?window_zoomed_flag,*Z,} #[bg=#FAFAFA,fg=#BC6C97,nobold,noitalics,nounderscore]"

set -wg window-status-format "#[bg=#FAFAFA,fg=#FAFAFA,noitalics] #[bg=#FAFAFA,fg=#8A847C] #{window_name} #[bg=#FAFAFA,fg=#FAFAFA,noitalics]"

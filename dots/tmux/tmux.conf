source-file ~/.config/tmux/theme/dark-theme.conf

# -------------------------
# PREFIX
# -------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -------------------------
# GENERAL
# -------------------------
set -g mouse on
set -sg escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g mode-keys vi

# -------------------------
# SPLITS
# -------------------------
bind n split-window -h -c "#{pane_current_path}"
bind m split-window -v -c "#{pane_current_path}"

# Alt versions (your zellij style)
bind -n M-n split-window -h -c "#{pane_current_path}"
bind -n M-m split-window -v -c "#{pane_current_path}"

# -------------------------
# PANE NAVIGATION (vim style)
# -------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# -------------------------
# RESIZE (like Alt+r mode)
# -------------------------
# bind -n M-h resize-pane -L 5
# bind -n M-j resize-pane -D 5
# bind -n M-k resize-pane -U 5
# bind -n M-l resize-pane -R 5

# -------------------------
# FULLSCREEN
# -------------------------
bind f resize-pane -Z
bind -n M-f resize-pane -Z

# -------------------------
# CLOSE PANE / TAB
# -------------------------
bind q kill-pane
bind -n M-q kill-pane

bind x kill-window
bind -n C-q kill-window

# -------------------------
# WINDOWS (tabs)
# -------------------------
bind t new-window
bind -n M-t new-window

bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Next / previous tab
bind -n M-h previous-window
bind -n M-l next-window

# -------------------------
# MOVE WINDOWS
# -------------------------
bind -n M-Left swap-window -t -1
bind -n M-Right swap-window -t +1

# -------------------------
# SCROLL MODE
# -------------------------
bind -n C-s copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi / command-prompt -p "search" "send -X search-forward '%%'"

# -------------------------
# DETACH
# -------------------------
bind d detach-client
bind -n M-d detach-client

# -------------------------
# RENAME
# -------------------------
bind r command-prompt "rename-window %%"
bind p command-prompt "rename-pane %%"

# -------------------------
# TOGGLE STATUS BAR
# -------------------------
bind b set-option status

# -------------------------
# FLOATING SUBSTITUTE
# -------------------------
# tmux has no floating panes -> zoom instead
bind w resize-pane -Z

# -------------------------
# RELOAD CONFIG
# -------------------------
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# -------------------------
# PLUGINS
# -------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
# Install with: C-a + I
# Update with:  C-a + U
# Delete with:  C-a + Alt + U
set -g @plugin 'tmux-plugins/tmux-sensible'
# tmux defaults should have been this way already
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Save Session: C-a + Ctrl+s
# Restore Session: C-a + Ctrl+r
# Detach: C-a + d
set -g @plugin 'tmux-plugins/tmux-continuum'
# Automatically saves your session every few minutes.
set -g @continuum-restore 'on'
# Without that: it saves automatically but restore remains manual.
set -g @plugin 'tmux-plugins/tmux-yank'
# run-shell ~/.config/tmux/plugins/sessionx-sk/sessionx.tmux

# THEMING

run '~/.config/tmux/plugins/tpm/tpm'

# ...
# Create a new session with
# tmux new -s main
# List sessions
# tmux ls
# Reattach: tmux a -t main
# kill session: tmux kill-session -t 9
# Tmux has its own command line where you can send actual commands
# Ctrl+a+:
# set status off/on # Hide the bar
# rename-session random-name
# Switch betwen sessions
# Ctrl+a+( or Ctrl+a)
# ctrl+a+L # switch between last and current session
# ctrl+a+S # See al sessions
# tmux switch-client -t new # switch to other session from within an opened session

# Reload Configuration
# tmux source-file ~/.config/tmux/tmux.conf

# Title bar
macos_titlebar_color #121212

# Optional: Additional luxury settings
# Background opacity (if you want transparency)
# background_opacity 0.95

# Padding
# padding_top 10
# padding_bottom 10
# padding_left 15
# padding_right 15

# Font styling
# bold_font auto
# italic_font auto
# bold_italic_font auto

# Mouse
# mouse_hide_wait 2.0
# url_color #d4b87a
# url_style curly

# Advanced
# adjust_line_height 0
# adjust_column_width 0
# sync_to_monitor no

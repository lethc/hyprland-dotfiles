# Tema Matrix para Kitty Terminal
# Basado en el tema del repositorio webstonehq/tuxedo

# Colores de fondo y primer plano
background #0a120a
foreground #7fcc7f

# Colores para la selección y el cursor
selection_background #1f3a1f
selection_foreground #7fcc7f
cursor #1a2e1a
cursor_text_color #7fcc7f

# Colores normales (paleta de 8 colores)
color0 #0a120a   # Negro (fondo)
color1 #ff8c8c   # Rojo (pri_a)
color2 #9fff9f   # Verde (accent)
color3 #ffd66e   # Amarillo (pri_b)
color4 #7fd0ff   # Azul (pri_d)
color5 #cf9fff   # Magenta (pri_other)
color6 #7fcc7f   # Cian (fg)
color7 #7fcc7f   # Blanco (fg)

# Colores brillantes (paleta de 8 colores)
color8 #3f6a3f   # Negro brillante (dim)
color9 #ff8c8c   # Rojo brillante
color10 #9fff9f  # Verde brillante
color11 #ffd66e  # Amarillo brillante
color12 #7fd0ff  # Azul brillante
color13 #cf9fff  # Magenta brillante
color14 #9fff9f  # Cian brillante (accent)
color15 #7fcc7f  # Blanco brillante

# Colores específicos de la interfaz
active_border_color #1a2a1a
inactive_border_color #0f1a0f
bell_border_color #ffd66e

# Personalización de la barra de título (opcional)
titlebar_color #0f1a0f
titlebar_bg #0f1a0f

# Color de las URLs subrayadas (opcional)
url_color #9fff9f

# Colores para el marcador de posición (mark)
mark1_background #1f3a1f
mark1_foreground #7fcc7f

# Opcional: ajustar el contraste y el suavizado de bordes
# background_opacity 1.0
# background_blur 0
